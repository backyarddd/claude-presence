<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0f0a18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#7C3AED" stroke-width="12" opacity="0.3"/>
  <!-- Stylized "C" spark / AI symbol -->
  <!-- Main spark shape - a stylized asterisk/star representing AI -->
  <g transform="translate(512,512)">
    <!-- Vertical bar -->
    <rect x="-28" y="-200" width="56" height="400" rx="28" fill="url(#glow)"/>
    <!-- Horizontal bar -->
    <rect x="-200" y="-28" width="400" height="56" rx="28" fill="url(#glow)"/>
    <!-- Diagonal bar 1 -->
    <rect x="-28" y="-200" width="56" height="400" rx="28" fill="url(#glow)" transform="rotate(45)"/>
    <!-- Diagonal bar 2 -->
    <rect x="-28" y="-200" width="56" height="400" rx="28" fill="url(#glow)" transform="rotate(-45)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="52" fill="#C4B5FD"/>
    <circle cx="0" cy="0" r="30" fill="#EDE9FE"/>
  </g>
</svg>