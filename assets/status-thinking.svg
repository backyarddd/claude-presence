<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0f0a18"/>
    </linearGradient>
    <linearGradient id="bulb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>
  <!-- Lightbulb shape -->
  <g transform="translate(512,480)">
    <!-- Bulb top - circle -->
    <circle cx="0" cy="-60" r="200" fill="url(#bulb)"/>
    <!-- Bulb neck -->
    <rect x="-80" y="100" width="160" height="40" rx="8" fill="#A78BFA"/>
    <rect x="-70" y="152" width="140" height="36" rx="8" fill="#A78BFA"/>
    <rect x="-60" y="200" width="120" height="32" rx="16" fill="#A78BFA"/>
    <!-- Filament lines inside bulb -->
    <line x1="-50" y1="-10" x2="0" y2="-120" stroke="#EDE9FE" stroke-width="16" stroke-linecap="round"/>
    <line x1="50" y1="-10" x2="0" y2="-120" stroke="#EDE9FE" stroke-width="16" stroke-linecap="round"/>
    <!-- Glow rays -->
    <line x1="-280" y1="-60" x2="-230" y2="-60" stroke="#7C3AED" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <line x1="230" y1="-60" x2="280" y2="-60" stroke="#7C3AED" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <line x1="-200" y1="-240" x2="-164" y2="-210" stroke="#7C3AED" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <line x1="200" y1="-240" x2="164" y2="-210" stroke="#7C3AED" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="-310" x2="0" y2="-280" stroke="#7C3AED" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>